name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # service containers cannot take command args, and the SDK's API version is usually
      # ahead of the Azurite image — hence docker run with --skipApiVersionCheck
      - name: Start Azurite
        run: |
          docker run -d --name azurite \
            -p 10000:10000 -p 10001:10001 -p 10002:10002 \
            mcr.microsoft.com/azure-storage/azurite \
            azurite --skipApiVersionCheck --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build -c Release

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: E2E over real MCP stdio against Azurite
        working-directory: test
        env:
          AZURE_QUEUE_CONN: UseDevelopmentStorage=true
        run: |
          npm ci
          node e2e.mjs
